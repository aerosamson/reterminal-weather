name: Update Weather Image

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the hour
  workflow_dispatch:   # Allows manual refresh in GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Generate Weather Image
        env:
          API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python weather.py

      - name: Save Image to Repository
        run: |
          git config --global user.name "reTerminal-Bot"
          git config --global user.email "bot@github.com"
          git add weather.png
          git commit -m "Auto-update weather: $(date)" || exit 0
          git push
